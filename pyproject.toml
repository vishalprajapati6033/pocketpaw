[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
only-include = ["src/pocketpaw", "ee"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
# Prompt-text modules — long lines inside multi-line example/docs
# strings can't be wrapped without changing the rendered prompt.
"ee/ripple/_pockets.py" = ["E501"]
"ee/ripple/_design.py" = ["E501"]

