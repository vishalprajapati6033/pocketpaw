    "google-api-python-client>=2.100.0",
    "google-auth>=2.25.0",
    "google-genai>=1.0.0",
    "html2text>=2020.1.16",
    "elevenlabs>=1.0.0",
    "pytesseract>=0.3.10",
    "sarvamai>=0.1.25",
    "mcp>=1.0.0",
    "openai-agents>=0.2.0",
    "google-adk>=1.0.0",
    "github-copilot-sdk>=0.1.0",
    "deepagents>=0.5.8,<0.6.0",
    "langchain-mcp-adapters>=0.2.2,<0.3.0",
    # Required for openai/openai_compatible/openrouter/litellm provider paths
    # in agents/deep_agents.py — deepagents only pulls langchain-anthropic and
    # langchain-google-genai, so this fills the gap.
    "langchain-openai>=1.2.0,<2.0.0",
    "langchain-litellm>=0.6.4,<0.6.5",
    # dev tools
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0,<1.0.0",  # pinned: incompatible with pytest-asyncio 1.x until asyncio.run() call sites are migrated
    "ruff>=0.4.0",
    "mypy>=1.8.0",
    "pytest-playwright>=0.7.2",
    "mongomock-motor>=0.0.36",
    "moto[s3]>=5.0.0",
    "types-aiofiles>=25.1.0.20260409",
    "import-linter>=2.11",
]

# Enterprise layer — opt-in. `uv sync --dev --group ee` installs the
# `pocketpaw-ee` package (ee/) editable on top of the OSS core, giving a full
# development environment. Plain `uv sync --dev` stays OSS-only (that is what
# the Test (OSS-only) CI job relies on).
ee = ["pocketpaw-ee"]

[tool.uv.sources]
pocketpaw-ee = { path = "ee", editable = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--ignore=tests/cloud --ignore=tests/e2e"
markers = [
    "enforce_scope: opt a test out of the global _TESTING_FULL_ACCESS bypass so require_scope fails closed as in production",
]

# ---------------------------------------------------------------------------
# import-linter: OSS-EE boundary
# ---------------------------------------------------------------------------
# This root config holds the open-core boundary contract only. The OSS core
# package `pocketpaw` must never statically import the enterprise package
# `pocketpaw_ee`. Optional EE features are reached at runtime via entry-point
# Protocols — see pocketpaw/extensions.py + pocketpaw/_registry.py — which
# import-linter's static analysis correctly does not flag. The single
# exception is the admin CLI: `pocketpaw <cloud subcommands>` administers an
# EE install directly.
#
# The cloud Beanie-chokepoint contracts moved to ee/pyproject.toml in the
# OSS-EE split (Phase 4); run them with `cd ee && uv run lint-imports`.
#
# `pocketpaw_ee` must be importable for this contract to resolve, so
# `lint-imports` here runs only in the full (core + EE) CI job.
[tool.importlinter]
root_packages = ["pocketpaw_ee", "pocketpaw"]

[[tool.importlinter.contracts]]
name = "OSS core may not import from EE"
type = "forbidden"
source_modules = ["pocketpaw"]
forbidden_modules = ["pocketpaw_ee"]
ignore_imports = [
    "pocketpaw.tools.cli -> pocketpaw_ee.cloud",
    "pocketpaw.tools.cli -> pocketpaw_ee.cloud.shared.db",
    "pocketpaw.tools.cli -> pocketpaw_ee.cloud.pockets.service",
    "pocketpaw.tools.cli -> pocketpaw_ee.cloud.pockets.agent_context",
    "pocketpaw.tools.cli -> pocketpaw_ee.agent.pocket_specialist.cli_tool",
]
