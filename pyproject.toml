# Updated: 2026-04-09 — Release 0.4.16: security rollup (CredentialStore v2, WS auth, dangerous-cmd hardening, OWASP fixes), discli 0.7, soul 0.2.9, Python 3.14 warning, fast-chat disabled for CLI compaction.
[project]
name = "pocketpaw"
version = "0.4.16"
description = "The AI agent that runs on your laptop, not a datacenter. OpenClaw alternative with one-command install."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
keywords = [
    "ai", "agent", "telegram", "assistant", "automation",
    "browser", "llm", "ollama", "openai", "anthropic",
    "self-hosted", "local-first", "privacy"
]
authors = [
    { name = "PocketPaw Team", email = "hello@pocketpaw.ai" }
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Home Automation",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Internet :: WWW/HTTP :: Browsers",
    "Typing :: Typed",
]

dependencies = [
    # Config
    "pydantic>=2.10.0",
    "pydantic-settings>=2.1.0",
    # HTTP client (used everywhere)
    "httpx>=0.26.0",
    # Async file I/O
    "aiofiles>=23.2.0",
    # LLM Clients
    "openai>=1.60.0",
    "anthropic>=0.45.0",
    # Agent Backend (recommended default)
    "claude-agent-sdk>=0.1.72",
    # Dashboard (default mode — must be in core so `pip install pocketpaw` just works)
    "uvicorn[standard]>=0.31.1",
    "jinja2>=3.1.0",
    "fastapi>=0.134.0",   # fastapi 0.134.0 first allowed starlette 1.0.0 (dropped upper bound)
    "qrcode[pil]>=7.4",
    "python-multipart>=0.0.22",
    # Logging & CLI
    "rich>=13.0.0",
    "click>=8.0",
    # Scheduling
    "apscheduler>=3.10.0",
    "python-dateutil>=2.8.0",
    # Credential Encryption
    "cryptography>=46.0.0",
    # Image basics
    "pillow>=10.0.0",
    # Soul Protocol — runtime imports from soul_protocol.spec.journal and
    # soul_protocol.engine.journal for fleet installer event emission (#947).
    # Promoted from optional extra to base dep in v0.3.1 integration work;
    # the runtime now takes a hard dependency on the journal primitives.
    "soul-protocol[engine]>=0.3.1",
    # NOTE: livekit-agents / livekit-plugins-deepgram moved to ee/pyproject.toml
    # in the OSS-EE split (Phase 4) — only ee/pocketpaw_ee/cloud/livekit imports them.
]

[project.optional-dependencies]
# --- Feature extras ---
vector = ["chromadb", "bm25s"]
knowledge = ["trafilatura", "bm25s", "pypdf"]
databases = [
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.29.0",       # PostgreSQL
    "aiomysql>=0.2.0",       # MySQL / MariaDB
    "aiosqlite>=0.20.0",     # SQLite
]
postgresql = ["sqlalchemy[asyncio]>=2.0.0", "asyncpg>=0.29.0"]
mysql = ["sqlalchemy[asyncio]>=2.0.0", "aiomysql>=0.2.0"]
mongodb = ["motor>=3.3.0", "beanie>=1.26.0"]
# S3-compatible object storage for the uploads module (src/pocketpaw/uploads/s3.py).
# Previously only reachable via the (removed) `enterprise` extra.
s3 = ["boto3>=1.34.0"]
graph = ["networkx>=3.0"]
dashboard = [
    # Kept for backward compat — dashboard deps are now in core.
    # Users with `pip install pocketpaw[dashboard]` in scripts won't break.
]
telegram = [
    "python-telegram-bot>=21.0",
]
browser = [
    "playwright>=1.50.0",
]
desktop = [
    "psutil>=5.9.0",
    "pyautogui>=0.9.54",
]
openai-agents = [
    "openai-agents>=0.2.0",
]
codex-sdk = [
    # Official OpenAI Codex Python SDK — typed events + abort signal,
    # replaces our subprocess + NDJSON parsing wrapper. The wheel does
    # not bundle the codex binary; users supply it via ``npm install -g
    # @openai/codex`` (auto-discovered) or ``Codex.install(version=...)``.
    "openai-codex-sdk>=0.1.11",
]
google-adk = [
    "google-adk>=1.0.0",
]
copilot-sdk = [
    "github-copilot-sdk>=0.1.0",
]
deep-agents = [
    "deepagents>=0.5.8,<0.6.0",
    "langchain-mcp-adapters>=0.2.2,<0.3.0",
    # Required for openai/openai_compatible/openrouter/litellm provider paths
    # in agents/deep_agents.py — deepagents only pulls langchain-anthropic and
    # langchain-google-genai, so this fills the gap.
    "langchain-openai>=1.2.0,<2.0.0",
    # Native LiteLLM integration — handles provider-specific quirks
    # (DeepSeek reasoning_content, Anthropic thinking blocks, etc.) that the
    # generic ChatOpenAI masquerade silently dropped on the floor.
    # Pinned to 0.6.4 (excluding 0.6.5+) because 0.6.5 requires
    # litellm>=1.83.14 which pins openai==2.24.0 and conflicts with
    # langchain-openai>=1.2.0 (which needs openai>=2.26.0).
    "langchain-litellm>=0.6.4,<0.6.5",
]
litellm = [
    "litellm>=1.40.0",
]
memory = [
    "mem0ai>=0.1.115",
    "ollama>=0.6.1",
]
soul = [
    "soul-protocol[engine]>=0.3.0",
]

# --- Channel extras ---
discord = [
    "discord-cli-agent>=0.7.0",
]
slack = [
    "slack-bolt>=1.20.0",
