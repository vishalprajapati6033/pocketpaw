[project.scripts]
pocketpaw = "pocketpaw.__main__:main"

# --- Extension-point providers (OSS-EE split) ---
# Core (`pocketpaw`) discovers optional providers via importlib entry-points
# in the `pocketpaw.*` groups — see pocketpaw/extensions.py for the Protocols
# and pocketpaw/_registry.py for discovery. The enterprise providers are
# declared by the `pocketpaw-ee` package (ee/pyproject.toml), not here: the
# OSS core ships no entry-points of its own and degrades gracefully when none
# are found.

[project.urls]
Homepage = "https://pocketpaw.xyz"
Repository = "https://github.com/pocketpaw/pocketpaw"
Issues = "https://github.com/pocketpaw/pocketpaw/issues"
Documentation = "https://pocketpaw.xyz/introduction"
Discord = "https://discord.gg/asRrtm95Zc"
Twitter = "https://twitter.com/prakashd88"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
# OSS core only. The enterprise layer (ee/pocketpaw_ee) is built as the
# separate `pocketpaw-ee` wheel from ee/pyproject.toml.
only-include = ["src/pocketpaw"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
# Prompt-text modules — long lines inside multi-line example/docs
# strings can't be wrapped without changing the rendered prompt.
"src/pocketpaw/ripple/_pockets.py" = ["E501"]
"src/pocketpaw/ripple/_design.py" = ["E501"]

[dependency-groups]
dev = [
    # all deps (flattened from [all])
    "playwright>=1.50.0",
    "mem0ai>=0.1.115",
    "ollama>=0.6.1",
