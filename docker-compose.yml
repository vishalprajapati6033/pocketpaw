services:
  pocketpaw:
    build: .
    container_name: pocketpaw
    ports:
      - "${POCKETPAW_PORT:-8888}:8888"
    volumes:
      - pocketpaw-data:/home/pocketpaw/.pocketpaw
      # Agent-created files (via Write/Bash tools) — accessible at ./workspace/ on host
      - ./workspace:/home/pocketpaw/workspace
    # Allows the container to reach services on the host via host.docker.internal
    # (e.g. Ollama running on the host: POCKETPAW_OLLAMA_HOST=http://host.docker.internal:11434)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"
        reservations:
          memory: 2G
          cpus: "2"
    restart: unless-stopped

  # Local LLM — start with: docker compose --profile ollama up -d
  ollama:
    image: ollama/ollama:latest
    container_name: pocketpaw-ollama
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # GPU passthrough (uncomment for NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Vector DB for mem0 semantic memory — start with: docker compose --profile qdrant up -d
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pocketpaw-qdrant
    profiles: [qdrant]
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # MongoDB for the enterprise (pocketpaw-ee) cloud layer — auth, rooms,
  # messaging, billing, knowledge base. Only needed for enterprise dev:
  #   docker compose --profile mongo up -d
  # The cloud layer defaults to mongodb://localhost:27017/paw-enterprise — which
  # this service provides — so no config is needed; override with the
  # CLOUD_MONGODB_URI env var to point elsewhere.
  mongo:
    image: mongo:7
    container_name: pocketpaw-mongo
    profiles: [mongo]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  pocketpaw-data:
  ollama-data:
  qdrant-data:
  mongo-data:
